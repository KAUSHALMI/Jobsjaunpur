<body>
    <script>
        let num = 42;
let str = 'hello';
let bool = true;
let undef; // Declared but never assigned

console.log(`typeof num = ${typeof num}`);
console.log(`typeof str = ${typeof str}`);
console.log(`typeof bool = ${typeof bool}`);
console.log(`typeof undef = ${typeof undef}`);
    </script>
