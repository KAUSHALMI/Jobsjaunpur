<html>
<html>
<head>
    <form action="Service Login Page">
    <title>Service Login Page</title>
</head>
<body>
    <h1>Novel Service Login</h1>
    <label for="">Username:</label><input type="Username" required><br><br>
     <label for="">Password:</label><input type="password" required><br><br>
      <label for="">City Of Employment:</label><input type="text" required><br><br>
    <label for="server">Web server</label>
        <select id="server" name="server">
            <option value="">— Choose a server —</option>
            <option value="apache">Apache</option>
            <option value="nginx">Nginx</option>
            <option value="iis">IIS</option>
        </select><br><br>

        <fieldset>
            <legend for="Role:">Please specify your role:</legend><br>
            <input type="radio" name="Role">Admin
            <input type="radio" name="Role">Enginer
            <input type="radio" name="Role">Manager
            <input type="radio" name="Role">Guest
        </fieldset><br><br>
        <fieldset>
            <legend for="Single:">Single Sign-on to the following:</legend><br>
            <input type="checkbox" name="Role">Mail
            <input type="checkbox" name="Role">Payroll
            <input type="checkbox" name="Role">Self-service
        </fieldset><br><br>
        <input type="submit">
        <input type="reset">
        </form>
</body>
</html>
