<html>
<head>
    <title>TASK</title>
    <style>
        *{
           margin: 0px; 
           padding: 0pc;
        }
        header{
            height: 50px;
            background-color: black;
            text-align: center;
            color: white;
            opacity: 0.7;
        }
        .container{
            display: flex;
            padding: 20px;
            gap: 20px;
        }
        .sidebar{
            background-color: orange;
            padding:20px;
            color: white;
        }
        .box{
            display: flex;
            gap: 10px;
            background-color: rgb(116, 116, 219);
            flex:3;
            padding:20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap:15px;
        }
        .card{
            background-color: white;
            color: black;
            height: 108px;
            width: 108px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 22px;
        }
        footer{
            height: 50px;
            background-color: black;
            text-align: center;
            color: white;
            opacity: 0.7;
        }
        @media (max-width:789px){
            .container{
                flex-direction: column;
            }
            .sidebar{
                min-height: 120px;
            }
            .content{
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header>
        HEADER
    </header>
    <div class="container">
        <div class="sidebar">
            <h1>Side Bar</h1>
            <p>Menu 1</p>
            <p>Menu 2</p>
            <p>Menu 3</p>
        </div>
        <div class="box">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
            <div class="card">4</div>
            <div class="card">5</div>
            <div class="card">6</div>
        </div>
    </div>
    <footer>
        FOOTER
    </footer>
</body>
</html>
