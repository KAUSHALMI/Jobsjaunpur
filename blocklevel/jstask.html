<html>
<head>
    <title>Arithmetic Operator Rundown</title>
</head>
<body>
    <script>
        const n = 7;
        const temperature = 18;
        console.log("n = " + (n));
        console.log("parity = " + ((n % 2 === 0) ? "even" : "odd"));
        console.log("temperature = " + (temperature));
        console.log("feeling = " + ((temperature > 18) ? "warm" : "cool"));
    </script>
</body>
</html>
