<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hover</title>
    <style>
        .hovereffect{
            height: 100px;
            width: 100px;
            background-color: green;
            transition:all 2s;
        }
        .hovereffect:hover{
            background-color: red;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="hovereffect"></div>
</body>
</html>
