<!DOCTYPE html>
<html lang="en">
<head>
    <title>Animation</title>
    <style>
        .animation1{
            height: 200px;
            width:200px;
            background-color: green;
            animation: Myanimation 5s infinite;
        }
        @keyframes Myanimation {
            0%{
                height: 200px;
                width: 200px;
                background-color: green;
            }
            50%{
                height: 200px;
                width: 200px;
                background-color: red;
                border-radius: 50%;
            }
            100%{
                height: 200px;
                width: 200px;
                background-color: yellow;
            }
        }
    </style>
</head>
<body>
    <div class="animation1"></div>
</body>
</html>
