<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typography Task</title>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.6;
      text-align: justify;
      color: #111;
      max-width: 600px; /* Optional: bounds the text so the justification is clearly visible */
      margin: 20px auto;
      padding: 0 15px;
    }

    h2 {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <h2>Heading</h2>
  <p>
    Justified body text that wraps across multiple lines for demonstration purposes here. 
    It ensures that both the left and right edges of the paragraph align neatly along the borders, 
    creating a clean, magazine-like print layout.
  </p>

</body>
</html>
