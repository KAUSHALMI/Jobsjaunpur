<html lang="en">
<head>
    <title>Form control</title>
</head>
<body>
    <center><h1><u>Registation Form</u></h1></center><br>
    <center><form action="">
    <label for="">1.Enter First Name: </label><input type="text" placeholder="Enter Your First Name" required><br><br>
    <label for="">2.Enter Last Name: </label><input type="text" placeholder="Enter Your Last Name" required><br><br>
    <label for="">3.Enter Email: </label><input type="email" placeholder="Enter Your Email" required><br><br>

        <option value="">Jaunpur</option>
        <option value="">Badlapur</option>
        <option value="">Shahganj</option>
        <option value="">Mchaligaw</option>
        <option value="">Sujanaganj</option>

    <label for="Gender">6.Select Gender:</label><br>
    <input type="radio" name="Gender"> Male <br>
    <input type="radio" name="Gender"> Female <br>
    <input type="radio" name="Gender"> Other <br><br>

    <label for="">7.Selcet Your Course : </label>
    <label for="">Html</label> <input type="checkbox">
    <label for="">Css</label> <input type="checkbox">
    <label for="">Java</label> <input type="checkbox">
    <label for="">Paythone</label> <input type="checkbox">
    <label for="">C++</label> <input type="checkbox"><br><br>
    <label for="">Share Your Feedback :</label><br> <textarea name="" id=""></textarea> <br><br>
    <input type="reset" name="" id="">
    <input type="submit" name="" id="">
    </form></center>
</body>
</html>
